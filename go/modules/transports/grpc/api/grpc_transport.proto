syntax = "proto3";

// buf:lint:ignore PACKAGE_DIRECTORY_MATCH
package grpcapi;

import "google/protobuf/empty.proto";

option go_package = "github.com/hiveot/hivekit/go/modules/transports/grpc/grpcapi";

message GrpcMsg {
  string msgType = 1;
  string jsonPayload = 2;
}

message PingRespMsg {
  string text = 1;
}

// There is little benefit to defining GRPC types for request, response and notification
// messages because RRN message payload is of type 'any' which isn't supported in GRPC.
// Therefore it needs JSON serialization. In that case it is easier to serialize the
// whole RRN message itself as payload.
// Once this works, figure out how to replace protobuf with a json codec instead.
service GrpcService {
  // ping to test connectivity
  rpc ping(google.protobuf.Empty) returns (PingRespMsg);

  // bi-directional message stream between client and server
  // buf:lint:ignore RPC_REQUEST_RESPONSE_UNIQUE
  rpc MsgStream(stream GrpcMsg) returns (stream GrpcMsg);
}
